<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Password Validation</title>
</head>
<body>
    <h1>Password Validation</h1>

    {% if errors %}
        <ul style="color: red;">
            {% for error in errors %}
                <li>{{ error }}</li>
            {% endfor %}
        </ul>
    {% endif %}

    <form method="post">
        <label for="password">Password:</label>

        <input
            id="password"
            name="password"
            type="password"
            maxlength="64"
            autocomplete="new-password"
            required
        >

        <button type="submit">Login</button>
    </form>
</body>
</html>
