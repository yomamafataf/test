name: Secure Web Application CI

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  integration-and-ui:
    name: Integration and UI Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: web/requirements.txt

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r web/requirements.txt

      - name: Create artifact directory
        run: mkdir -p artifacts

      - name: Start Flask and nginx
        run: docker compose up --detach --build web nginx

      - name: Wait for HTTP endpoint
        run: |
          ready=false

          for attempt in {1..30}; do
            if curl --fail --silent \
              --output /dev/null \
              http://127.0.0.1/; then
              ready=true
              break
            fi

            echo "Waiting for application: attempt ${attempt}/30"
            sleep 2
          done

          if [ "$ready" != "true" ]; then
            echo "Application did not become ready."
            docker compose ps
            docker compose logs
            exit 1
          fi

      - name: Test invalid password over HTTP
        run: |
          curl --silent --show-error \
            --data-urlencode "password=password" \
            --output artifacts/invalid-response.html \
            http://127.0.0.1/

          grep --fixed-strings \
            "common-password list" \
            artifacts/invalid-response.html

      - name: Test valid password over HTTP
        run: |
          curl --silent --show-error \
            --data-urlencode \
            "password=Correct-Horse-Battery-Staple-2026!" \
            --output artifacts/valid-response.html \
            http://127.0.0.1/

          grep --fixed-strings \
            "Welcome" \
            artifacts/valid-response.html

      - name: Run Selenium UI tests
        env:
          BASE_URL: http://127.0.0.1/
        run: python web/test_selenium.py

      - name: Collect container logs
        if: always()
        run: |
          docker compose ps > artifacts/compose-status.txt || true
          docker compose logs --no-color > artifacts/compose.log || true

      - name: Upload test evidence
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: integration-and-ui-evidence
          path: artifacts/
          if-no-files-found: warn

      - name: Stop containers
        if: always()
        run: docker compose down --volumes --remove-orphans

  dependency-and-security:
    name: Dependency and Security Checks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: web/requirements.txt

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit bandit
          mkdir -p artifacts

      - name: Audit Python dependencies
        id: pip_audit
        continue-on-error: true
        run: |
          pip-audit \
            --requirement web/requirements.txt \
            --format json \
            --output artifacts/pip-audit.json

      - name: Scan Python source code
        id: bandit
        continue-on-error: true
        run: |
          bandit \
            --recursive web \
            --exclude web/test_selenium.py \
            --format json \
            --output artifacts/bandit.json

      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: dependency-and-security-reports
          path: artifacts/
          if-no-files-found: warn

      - name: Enforce security result
        if: always()
        run: |
          if [ "${{ steps.pip_audit.outcome }}" != "success" ]; then
            echo "pip-audit reported vulnerable dependencies."
            exit 1
          fi

          if [ "${{ steps.bandit.outcome }}" != "success" ]; then
            echo "Bandit reported source-code security issues."
            exit 1
          fi