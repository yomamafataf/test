name: Flask Integration Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  TestCase:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python Dependencies
        run: pip install -r web/requirements.txt

      - name: Start Flask App in Background
        working-directory: ./web
        run: |
          nohup python app.py > flask.log 2>&1 &

      - name: Wait for Flask
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:5000/ > /dev/null; then
              echo "Flask is ready"
              exit 0
            fi

            echo "Waiting for Flask ($attempt/30)..."
            sleep 2
          done

          echo "Flask did not start"
          cat web/flask.log
          exit 1

      - name: HTTP Integration Test
        run: |
          curl --fail --silent --show-error http://127.0.0.1:5000/ |
          grep --ignore-case "password"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install ESLint
        working-directory: ./web
        run: npm install --no-save eslint

      - name: Run ESLint on JavaScript Files
        working-directory: ./web
        run: npx eslint . --config eslint.config.mjs

      - name: Run Selenium Password Tests
        working-directory: ./web
        env:
          BASE_URL: http://127.0.0.1:5000/
        run: python test_selenium.py

      - name: Upload Test Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-logs
          path: web/flask.log
          if-no-files-found: warn